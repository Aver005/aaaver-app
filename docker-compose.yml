services:
  app:
    build: .
    container_name: aaaver-app
    restart: unless-stopped
    ports:
      - '6110:3000'
    env_file: .env
    environment:
      # внутри контейнера всегда так, что бы ни лежало в .env
      PORT: 3000
      DATABASE_PATH: /data/aaaver.db
      SITES_DIR: /sites
    volumes:
      # БД живёт на хосте: ./data/aaaver.db можно копировать, бэкапить
      # и подменять без пересборки контейнера
      - ./data:/data
      # демки: ./sites/<slug>/ на хосте = https://.../<slug>/, тоже без пересборки
      - ./sites:/sites:ro
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "const r = await fetch('http://localhost:3000/api/health'); process.exit(r.ok ? 0 : 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Автодеплой демок: опрашивает релизы по sites.config.json и обновляет
  # sites/. Единственный, у кого этот каталог смонтирован на запись, —
  # основной сервер видит его read-only.
  sites-updater:
    build: .
    container_name: aaaver-sites-updater
    restart: unless-stopped
    command: ['bun', 'scripts/sites-updater.ts']
    env_file: .env
    environment:
      SITES_DIR: /sites
    volumes:
      - ./sites:/sites
      - ./sites.config.json:/app/sites.config.json:ro
