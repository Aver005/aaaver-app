services:
  app:
    build: .
    container_name: aaaver-app
    restart: unless-stopped
    ports:
      - '6110:3000'
    env_file: .env
    environment:
      # внутри контейнера всегда так, что бы ни лежало в .env
      PORT: 3000
      DATABASE_PATH: /data/aaaver.db
      SITES_DIR: /sites
    volumes:
      # БД живёт на хосте: ./data/aaaver.db можно копировать, бэкапить
      # и подменять без пересборки контейнера
      - ./data:/data
      # демки: ./sites/<slug>/ на хосте = https://.../<slug>/, тоже без пересборки
      - ./sites:/sites:ro
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "const r = await fetch('http://localhost:3000/api/health'); process.exit(r.ok ? 0 : 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
